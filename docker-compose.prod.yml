services:
  web:
    image: ${APP_IMAGE:?set APP_IMAGE to the GHCR image reference}
    container_name: lista-obecnosci
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_APP: app:create_app
    networks:
      - proxy
    ports:
      - "8084:5000"
    volumes:
      - obecnosc-instance:/app/instance
      - ./static:/app/static
      - ./reports:/app/reports
      - ./invoices:/app/invoices
      - ./szablon.docx:/app/szablon.docx:ro
      - ./rejestr.docx:/app/rejestr.docx:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.lista2.rule=Host(`obecnosc.vestmedia.pl`)"
      - "traefik.http.routers.lista2.entrypoints=https"
      - "traefik.http.routers.lista2.tls=true"
      - "traefik.http.services.lista2.loadbalancer.server.port=5000"

networks:
  proxy:
    external: true

volumes:
  obecnosc-instance:
    external: true
    name: obecnosc-instance