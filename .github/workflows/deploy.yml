name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/suchokrates1/lista-obecnosci

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run tests
        run: pytest -q --tb=line

      - name: Run flake8
        run: flake8 app.py model.py routes tests init_db.py utils

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.66.220.72
          version: latest

      - name: Deploy on RPI
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: 100.66.220.72
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_IMAGE,GHCR_TOKEN
          command_timeout: 8m
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/suchokrates1/obecnosc
            git pull --ff-only origin master
            mkdir -p reports invoices static
            echo "$GHCR_TOKEN" | docker login ghcr.io -u suchokrates1 --password-stdin
            export APP_IMAGE
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm web flask db upgrade
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8084/healthz >/dev/null; then
                exit 0
              fi
              sleep 3
            done
            docker logs --tail 50 lista-obecnosci
            exit 1